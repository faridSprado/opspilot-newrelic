services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/opspilot.db
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    volumes:
      - opspilot_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  opspilot_data:
